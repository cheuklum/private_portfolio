<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Slides Viewer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e14;
      --surface: #181818;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #555;
      --accent: #c8f04a;
      --error: #ff5f5f;
      --water-deep: #0a1628;
      --water-mid: #0d2040;
      --water-light: #1a3a5c;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ─── LOADING OVERLAY ─── */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--water-deep);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      transition: opacity 0.8s ease, visibility 0.8s ease;
      overflow: hidden;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ─── WATER SCENE ─── */
    .water-scene {
      position: relative;
      width: 340px;
      height: 200px;
    }

    /* bubbles */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(100, 180, 255, 0.15);
      border: 1px solid rgba(100, 180, 255, 0.2);
      animation: rise linear infinite;
    }

    @keyframes rise {
      0%   { transform: translateY(0) translateX(0); opacity: 0.6; }
      50%  { transform: translateY(-80px) translateX(6px); opacity: 0.3; }
      100% { transform: translateY(-160px) translateX(-4px); opacity: 0; }
    }

    /* seaweed */
    .weed {
      position: absolute;
      bottom: 0;
      width: 6px;
      border-radius: 3px;
      transform-origin: bottom center;
      animation: sway 3s ease-in-out infinite;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-8deg) scaleY(1); }
      50%       { transform: rotate(8deg) scaleY(1.04); }
    }

    /* fish container swims across */
    .fish-swim {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      animation: swim 4s ease-in-out infinite alternate;
    }

    @keyframes swim {
      0%   { left: 20px; }
      100% { left: 260px; }
    }

    /* pixel fish built from divs */
    .fish {
      position: relative;
      width: 32px;
      height: 16px;
      animation: wobble 0.5s ease-in-out infinite alternate;
    }

    @keyframes wobble {
      0%   { transform: translateY(0px); }
      100% { transform: translateY(-3px); }
    }

    .fish-body {
      position: absolute;
      right: 0;
      top: 2px;
      width: 22px;
      height: 12px;
      background: var(--accent);
      border-radius: 50% 40% 40% 50% / 50% 50% 50% 50%;
    }

    .fish-eye {
      position: absolute;
      right: 4px;
      top: 4px;
      width: 3px;
      height: 3px;
      background: var(--water-deep);
      border-radius: 50%;
    }

    /* tail — triangle via border trick */
    .fish-tail {
      position: absolute;
      left: 0;
      top: 3px;
      width: 0;
      height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-right: 10px solid var(--accent);
      animation: tailwag 0.25s ease-in-out infinite alternate;
      transform-origin: right center;
    }

    @keyframes tailwag {
      0%   { transform: skewY(-15deg); }
      100% { transform: skewY(15deg); }
    }

    /* flip fish when swimming right */
    .fish-swim.going-left .fish {
      transform: scaleX(-1);
    }
    .fish-swim.going-left .fish .wobble { transform: scaleX(-1); }

    /* water surface shimmer */
    .water-surface {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(100,200,255,0.3) 20%,
        rgba(100,200,255,0.6) 50%,
        rgba(100,200,255,0.3) 80%,
        transparent 100%
      );
      animation: shimmer 2s ease-in-out infinite alternate;
    }

    @keyframes shimmer {
      0%   { opacity: 0.4; transform: scaleX(0.95); }
      100% { opacity: 1;   transform: scaleX(1.05); }
    }

    /* sandy bottom */
    .sand {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;
      background: linear-gradient(to top, #1a1208, #2a1f0e);
      border-radius: 0 0 12px 12px;
    }

    /* ─── LOGO + LABEL ─── */
    .loader-text {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .logo-word {
      font-family: 'DM Mono', monospace;
      font-size: 26px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    .logo-word .slash { color: var(--accent); }

    .loader-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ─── LOCK SCREEN ─── */
    #lock-screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 24px;
      background: var(--bg);
    }

    #lock-screen.visible { display: flex; }

    .lock-logo {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    .lock-logo .slash { color: var(--accent); }

    .lock-label p {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
      text-align: center;
    }

    .input-row {
      display: flex;
      width: 100%;
      max-width: 340px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    .input-row.error {
      border-color: var(--error);
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    #password-input {
      flex: 1;
      background: var(--surface);
      border: none;
      outline: none;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      letter-spacing: 0.08em;
    }

    #password-input::placeholder {
      color: var(--muted);
      letter-spacing: 0.02em;
      font-family: 'DM Sans', sans-serif;
    }

    #unlock-btn {
      background: var(--accent);
      border: none;
      padding: 14px 20px;
      cursor: pointer;
      color: #0e0e0e;
      font-weight: 500;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    #unlock-btn:hover { opacity: 0.85; }

    .error-msg {
      font-size: 12px;
      color: var(--error);
      font-family: 'DM Mono', monospace;
      min-height: 16px;
      text-align: center;
    }

    /* ─── VIEWER ─── */
    #viewer-screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #viewer-screen.visible { display: flex; }
    #viewer-screen.faded-in { opacity: 1; }

    .viewer-bar {
      height: 44px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
    }

    .viewer-bar span {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.06em;
    }

    #lock-again {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    #lock-again:hover { border-color: var(--text); color: var(--text); }

    #slides-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: #000;
    }

    #preload-frame {
      position: fixed;
      left: -9999px;
      top: -9999px;
      width: 1280px;
      height: 720px;
      border: none;
      visibility: hidden;
    }
  </style>
</head>
<body>

  <iframe id="preload-frame"></iframe>

  <!-- LOADER -->
  <div id="loader">
    <div class="water-scene" id="water-scene">
      <div class="water-surface"></div>

      <!-- seaweed -->
      <div class="weed" style="left:30px; height:40px; background:#1a4a2a; animation-delay:0s;"></div>
      <div class="weed" style="left:38px; height:28px; background:#1f5a30; animation-delay:0.4s;"></div>
      <div class="weed" style="left:260px; height:36px; background:#1a4a2a; animation-delay:0.8s;"></div>
      <div class="weed" style="left:270px; height:22px; background:#1f5a30; animation-delay:0.2s;"></div>
      <div class="weed" style="left:310px; height:32px; background:#1a4a2a; animation-delay:1.1s;"></div>

      <!-- bubbles -->
      <div class="bubble" style="width:5px;height:5px; left:60px; bottom:40px; animation-duration:3s; animation-delay:0s;"></div>
      <div class="bubble" style="width:3px;height:3px; left:120px; bottom:30px; animation-duration:4s; animation-delay:1s;"></div>
      <div class="bubble" style="width:6px;height:6px; left:200px; bottom:50px; animation-duration:3.5s; animation-delay:0.5s;"></div>
      <div class="bubble" style="width:4px;height:4px; left:280px; bottom:35px; animation-duration:2.8s; animation-delay:1.8s;"></div>
      <div class="bubble" style="width:3px;height:3px; left:160px; bottom:60px; animation-duration:4.2s; animation-delay:0.9s;"></div>

      <!-- pixel fish -->
      <div class="fish-swim" id="fish-swim">
        <div class="fish">
          <div class="fish-tail"></div>
          <div class="fish-body"></div>
          <div class="fish-eye"></div>
        </div>
      </div>

      <div class="sand"></div>
    </div>

    <div class="loader-text">
      <div class="logo-word">SA<span class="slash">\</span>HO</div>
      <div class="loader-label" id="loader-label">loading deck...</div>
    </div>
  </div>

  <!-- LOCK SCREEN -->
  <div id="lock-screen">
    <div class="lock-logo">SA<span class="slash">\</span>HO</div>
    <div class="lock-label">
      <p>Enter password to view deck</p>
    </div>
    <div class="input-row" id="input-row">
      <input id="password-input" type="password" placeholder="Password" autocomplete="off" />
      <button id="unlock-btn">Unlock →</button>
    </div>
    <p class="error-msg" id="error-msg"></p>
  </div>

  <!-- VIEWER -->
  <div id="viewer-screen">
    <div class="viewer-bar">
      <span>SA<span style="color:var(--accent)">\</span>HO — deck</span>
      <button id="lock-again">lock</button>
    </div>
    <iframe id="slides-frame" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
  </div>

  <script>
    const SLIDES_URL = 'https://docs.google.com/presentation/d/e/2PACX-1vSNVVQivIOn3p2xhu5-g0rsc2EunmdMJbMdbaKm4ZkMEzg2NrhMIvmr0AARhT5avWHhkfN0CxG-qJlE/pubembed?start=false&loop=false&delayms=3000';
    const PASSWORD   = 'sahogarage';
    const MIN_LOAD_MS = 15000;

    const loader        = document.getElementById('loader');
    const lockScreen    = document.getElementById('lock-screen');
    const viewerScreen  = document.getElementById('viewer-screen');
    const passwordInput = document.getElementById('password-input');
    const errorMsg      = document.getElementById('error-msg');
    const inputRow      = document.getElementById('input-row');
    const slidesFrame   = document.getElementById('slides-frame');
    const preloadFrame  = document.getElementById('preload-frame');
    const loaderLabel   = document.getElementById('loader-label');
    const fishSwim      = document.getElementById('fish-swim');

    // flip fish direction on each animation iteration
    fishSwim.addEventListener('animationiteration', () => {
      fishSwim.classList.toggle('going-left');
    });

    // loading label cycling
    const loadingPhrases = [
      'loading deck...', 'almost there...', 'fetching slides...',
      'warming up...', 'nearly ready...'
    ];
    let phraseIdx = 0;
    const phraseInterval = setInterval(() => {
      phraseIdx = (phraseIdx + 1) % loadingPhrases.length;
      loaderLabel.textContent = loadingPhrases[phraseIdx];
    }, 3000);

    function revealLock() {
      clearInterval(phraseInterval);
      loaderLabel.textContent = 'ready ✦';
      setTimeout(() => {
        loader.classList.add('hidden');
        lockScreen.classList.add('visible');
        setTimeout(() => passwordInput.focus(), 100);
      }, 500);
    }

    // Start preloading immediately
    preloadFrame.src = SLIDES_URL;

    // Hard 15 second minimum — just wait it out
    setTimeout(revealLock, MIN_LOAD_MS);

    // Unlock
    function attemptUnlock() {
      if (passwordInput.value === PASSWORD) {
        lockScreen.classList.remove('visible');
        viewerScreen.classList.add('visible');
        slidesFrame.src = SLIDES_URL;
        requestAnimationFrame(() => requestAnimationFrame(() => {
          viewerScreen.classList.add('faded-in');
        }));
      } else {
        errorMsg.textContent = 'incorrect password';
        inputRow.classList.add('error');
        setTimeout(() => inputRow.classList.remove('error'), 400);
        passwordInput.value = '';
        passwordInput.focus();
      }
    }

    document.getElementById('unlock-btn').addEventListener('click', attemptUnlock);
    passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptUnlock(); });

    document.getElementById('lock-again').addEventListener('click', () => {
      slidesFrame.src = '';
      viewerScreen.classList.remove('faded-in');
      setTimeout(() => {
        viewerScreen.classList.remove('visible');
        lockScreen.classList.add('visible');
        passwordInput.value = '';
        errorMsg.textContent = '';
        setTimeout(() => passwordInput.focus(), 100);
      }, 300);
    });
  </script>
</body>
</html>
