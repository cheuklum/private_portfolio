<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Slides Viewer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #555;
      --accent: #c8f04a;
      --error: #ff5f5f;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ─── LOADING OVERLAY ─── */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .logo-stack {
      position: relative;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-word {
      position: absolute;
      font-family: 'DM Mono', monospace;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--text);
      opacity: 0;
      transform: translateY(8px);
      animation: logoIn 0.5s ease forwards;
    }

    .logo-word .slash {
      color: var(--accent);
    }

    @keyframes logoIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes logoOut {
      to { opacity: 0; transform: translateY(-8px); }
    }

    .logo-word.exiting {
      animation: logoOut 0.35s ease forwards;
    }

    .loader-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .progress-track {
      width: 180px;
      height: 1px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      position: absolute;
      left: 0; top: 0;
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .loader-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* ─── LOCK SCREEN ─── */
    #lock-screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 24px;
    }

    #lock-screen.visible { display: flex; }

    .lock-logo {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .lock-logo .slash { color: var(--accent); }

    .lock-label {
      text-align: center;
    }

    .lock-label p {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
    }

    .input-row {
      display: flex;
      width: 100%;
      max-width: 340px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    .input-row.error {
      border-color: var(--error);
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    #password-input {
      flex: 1;
      background: var(--surface);
      border: none;
      outline: none;
      padding: 14px 16px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      letter-spacing: 0.08em;
    }

    #password-input::placeholder {
      color: var(--muted);
      letter-spacing: 0.02em;
      font-family: 'DM Sans', sans-serif;
    }

    #unlock-btn {
      background: var(--accent);
      border: none;
      padding: 14px 20px;
      cursor: pointer;
      color: #0e0e0e;
      font-weight: 500;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    #unlock-btn:hover { opacity: 0.85; }

    .error-msg {
      font-size: 12px;
      color: var(--error);
      font-family: 'DM Mono', monospace;
      min-height: 16px;
      text-align: center;
    }

    /* ─── VIEWER ─── */
    #viewer-screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #viewer-screen.visible { display: flex; }
    #viewer-screen.faded-in { opacity: 1; }

    .viewer-bar {
      height: 44px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
    }

    .viewer-bar span {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.06em;
    }

    #lock-again {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    #lock-again:hover { border-color: var(--text); color: var(--text); }

    #slides-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: #000;
    }

    /* preload frame — hidden off-screen */
    #preload-frame {
      position: fixed;
      left: -9999px;
      top: -9999px;
      width: 1280px;
      height: 720px;
      border: none;
      visibility: hidden;
    }
  </style>
</head>
<body>

  <!-- hidden preload iframe -->
  <iframe id="preload-frame"></iframe>

  <!-- LOADER -->
  <div id="loader">
    <div class="logo-stack">
      <div class="logo-word" id="logo-word">SA<span class="slash">\</span>HO</div>
    </div>
    <div class="loader-bottom">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="loader-label" id="loader-label">loading</div>
    </div>
  </div>

  <!-- LOCK SCREEN -->
  <div id="lock-screen">
    <div>
      <div class="lock-logo">SA<span class="slash">\</span>HO</div>
    </div>
    <div class="lock-label">
      <p>Enter password to view deck</p>
    </div>
    <div class="input-row" id="input-row">
      <input id="password-input" type="password" placeholder="Password" autocomplete="off" />
      <button id="unlock-btn">Unlock →</button>
    </div>
    <p class="error-msg" id="error-msg"></p>
  </div>

  <!-- VIEWER -->
  <div id="viewer-screen">
    <div class="viewer-bar">
      <span>SA<span style="color:var(--accent)">\</span>HO — deck</span>
      <button id="lock-again">lock</button>
    </div>
    <iframe id="slides-frame" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
  </div>

  <script>
    const SLIDES_URL = 'https://docs.google.com/presentation/d/e/2PACX-1vSNVVQivIOn3p2xhu5-g0rsc2EunmdMJbMdbaKm4ZkMEzg2NrhMIvmr0AARhT5avWHhkfN0CxG-qJlE/pubembed?start=false&loop=false&delayms=3000';
    const PASSWORD   = 'sahogarage';

    const loader       = document.getElementById('loader');
    const lockScreen   = document.getElementById('lock-screen');
    const viewerScreen = document.getElementById('viewer-screen');
    const passwordInput = document.getElementById('password-input');
    const errorMsg     = document.getElementById('error-msg');
    const inputRow     = document.getElementById('input-row');
    const slidesFrame  = document.getElementById('slides-frame');
    const preloadFrame = document.getElementById('preload-frame');
    const progressFill = document.getElementById('progress-fill');
    const loaderLabel  = document.getElementById('loader-label');
    const logoWord     = document.getElementById('logo-word');

    // ── Logo cycling animation ──
    const logoVariants = [
      'SA<span class="slash">\\</span>HO',
      'SA<span class="slash">/</span>HO',
      '<span class="slash">\\</span>HO',
      'SA<span class="slash">\\</span>',
      'SA<span class="slash">\\</span>HO',
    ];
    let logoIdx = 0;
    let logoCycleInterval = null;

    function cyclelogo() {
      logoWord.classList.add('exiting');
      setTimeout(() => {
        logoIdx = (logoIdx + 1) % logoVariants.length;
        logoWord.innerHTML = logoVariants[logoIdx];
        logoWord.classList.remove('exiting');
        logoWord.style.animation = 'none';
        logoWord.offsetHeight; // reflow
        logoWord.style.animation = '';
      }, 350);
    }

    // ── Preload + progress simulation ──
    let deckReady = false;
    let minTimeDone = false;
    const MIN_LOAD_MS = 3500; // minimum time to show loader

    function checkRevealLock() {
      if (deckReady && minTimeDone) {
        revealLock();
      }
    }

    function revealLock() {
      clearInterval(logoCycleInterval);
      progressFill.style.width = '100%';
      loaderLabel.textContent = 'ready';
      setTimeout(() => {
        loader.classList.add('hidden');
        lockScreen.classList.add('visible');
        setTimeout(() => passwordInput.focus(), 100);
      }, 400);
    }

    // Simulate smooth progress while waiting
    let fakeProgress = 0;
    const progressInterval = setInterval(() => {
      if (fakeProgress < 85) {
        fakeProgress += Math.random() * 6;
        progressFill.style.width = Math.min(fakeProgress, 85) + '%';
      }
    }, 300);

    // Start logo cycle
    logoCycleInterval = setInterval(cyclelogo, 900);

    // Start preloading the deck
    preloadFrame.src = SLIDES_URL;

    preloadFrame.addEventListener('load', () => {
      clearInterval(progressInterval);
      fakeProgress = 100;
      deckReady = true;
      loaderLabel.textContent = 'ready';
      checkRevealLock();
    });

    // Fallback — if iframe doesn't fire load (cross-origin), wait 6s max
    setTimeout(() => {
      deckReady = true;
      checkRevealLock();
    }, 6000);

    // Minimum display time
    setTimeout(() => {
      minTimeDone = true;
      checkRevealLock();
    }, MIN_LOAD_MS);

    // ── Unlock ──
    function attemptUnlock() {
      if (passwordInput.value === PASSWORD) {
        lockScreen.classList.remove('visible');
        viewerScreen.classList.add('visible');
        slidesFrame.src = SLIDES_URL;
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            viewerScreen.classList.add('faded-in');
          });
        });
      } else {
        errorMsg.textContent = 'incorrect password';
        inputRow.classList.add('error');
        setTimeout(() => inputRow.classList.remove('error'), 400);
        passwordInput.value = '';
        passwordInput.focus();
      }
    }

    document.getElementById('unlock-btn').addEventListener('click', attemptUnlock);
    passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptUnlock(); });

    // ── Lock again ──
    document.getElementById('lock-again').addEventListener('click', () => {
      slidesFrame.src = '';
      viewerScreen.classList.remove('faded-in');
      setTimeout(() => {
        viewerScreen.classList.remove('visible');
        lockScreen.classList.add('visible');
        passwordInput.value = '';
        errorMsg.textContent = '';
        setTimeout(() => passwordInput.focus(), 100);
      }, 300);
    });
  </script>
</body>
</html>
